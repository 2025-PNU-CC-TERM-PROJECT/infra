apiVersion: v1
kind: Namespace
metadata:
  name: ms-inference
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: ms-inference
  labels:
    app: inference-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
        - name: inference-service
          image: xxhyeok/ms-inference-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: IMAGE_MODEL_URL
              value: http://ai-image-serving-predictor.ms-models.svc.cluster.local/v1/models/mobilenet:predict
            - name: IMAGE_MODEL_HOST
              value: ai-image-serving-predictor.ms-models.svc.cluster.local
            - name: TEXT_MODEL_URL
              value: http://ai-text-serving-predictor.ms-models.svc.cluster.local/v1/models/kobart-summary:predict
            - name: TEXT_MODEL_HOST
              value: ai-text-serving-predictor.ms-models.svc.cluster.local
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: ms-inference
spec:
  selector:
    app: inference-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
