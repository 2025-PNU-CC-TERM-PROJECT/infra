apiVersion: v1
kind: Namespace
metadata:
  name: ms-gateway
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ms-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: xxhyeok/ms-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          env:
            - name: PORT
              value: "8088"
            - name: BACKEND_URL
              value: http://ms-backend.ms-backend.svc.cluster.local
            - name: ALLOWED_ORIGINS
              value: http://localhost:3000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ms-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8088
      targetPort: 8088
