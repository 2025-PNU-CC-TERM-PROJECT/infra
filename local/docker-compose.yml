services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cc-term
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-postgres-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cc-term"]
      interval: 5s
      timeout: 3s
      retries: 20

  image-model:
    build:
      context: ../../mock-model-server
    environment:
      MODEL_KIND: image
      PORT: 9000
    ports:
      - "9001:9000"

  text-model:
    build:
      context: ../../mock-model-server
    environment:
      MODEL_KIND: text
      PORT: 9000
    ports:
      - "9002:9000"

  inference-service:
    build:
      context: ../../inference-service
    environment:
      PORT: 8081
      IMAGE_MODEL_URL: http://image-model:9000/v1/models/mobilenet:predict
      IMAGE_MODEL_HOST: image-model
      TEXT_MODEL_URL: http://text-model:9000/v1/models/kobart-summary:predict
      TEXT_MODEL_HOST: text-model
    ports:
      - "8081:8081"
    depends_on:
      - image-model
      - text-model

  backend:
    build:
      context: ../../ms-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cc-term
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-postgres-password}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local-dev-secret-local-dev-secret-local-dev-secret-local-dev-secret}
      INTERNAL_INFERENCE_URL: http://inference-service:8081
      EXTERNAL_AI_IMAGE_URL: http://image-model:9000/v1/models/mobilenet:predict
      EXTERNAL_AI_IMAGE_HOST: image-model
      EXTERNAL_AI_TEXT_URL: http://text-model:9000/v1/models/kobart-summary:predict
      EXTERNAL_AI_TEXT_HOST: text-model
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      image-model:
        condition: service_started
      text-model:
        condition: service_started
      inference-service:
        condition: service_started

  api-gateway:
    build:
      context: ../../api-gateway
    environment:
      PORT: 8088
      BACKEND_URL: http://backend:8080
      AUTH_SERVICE_URL: http://backend:8080
      USER_SERVICE_URL: http://backend:8080
      INFERENCE_SERVICE_URL: http://backend:8080
      ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8088:8088"
    depends_on:
      - backend

  frontend:
    build:
      context: ../../ms-frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8088
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8088
      NEXT_PUBLIC_GRAFANA_URL: http://localhost:3001
      NEXT_PUBLIC_KIALI_URL: http://localhost:20001
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  postgres-data:
